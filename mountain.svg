<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141419" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)" />
  <rect width="512" height="512" rx="116" fill="url(#glass)" />
  
  <!-- Subtle border -->
  <rect width="504" height="504" x="4" y="4" rx="112" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />

  <!-- The Mountain -->
  <path d="M256 140 L70 410 L442 410 Z" fill="none" stroke="url(#aurora)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Altitude Line (Center indicator) -->
  <path d="M256 140 L256 410" stroke="url(#aurora)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M210 240 L302 240" stroke="url(#aurora)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
